<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
  <!-- D9 The Transit: a small body crossing a barely-visible ring on a graduated path.
       Measuring the invisible by its effects. Geometry study, not final art. -->
  <!-- the plate carries its own paper so the study is self-contained -->
  <rect width="600" height="360" fill="#FCFCFA"/>
  <!-- the unobserved body: barely-visible ring -->
  <circle cx="300" cy="180" r="110" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.28"/>
  <!-- the graduated transit path -->
  <line x1="60" y1="180" x2="540" y2="180" stroke="#1a1a1a" stroke-width="0.75" opacity="0.55"/>
  <!-- minor graduations every 24px -->
  <g stroke="#1a1a1a" stroke-width="0.75" opacity="0.55">
    <line x1="84"  y1="177" x2="84"  y2="183"/><line x1="108" y1="177" x2="108" y2="183"/>
    <line x1="132" y1="177" x2="132" y2="183"/><line x1="156" y1="177" x2="156" y2="183"/>
    <line x1="204" y1="177" x2="204" y2="183"/><line x1="228" y1="177" x2="228" y2="183"/>
    <line x1="252" y1="177" x2="252" y2="183"/><line x1="276" y1="177" x2="276" y2="183"/>
    <line x1="324" y1="177" x2="324" y2="183"/><line x1="348" y1="177" x2="348" y2="183"/>
    <line x1="372" y1="177" x2="372" y2="183"/><line x1="396" y1="177" x2="396" y2="183"/>
    <line x1="444" y1="177" x2="444" y2="183"/><line x1="468" y1="177" x2="468" y2="183"/>
    <line x1="492" y1="177" x2="492" y2="183"/><line x1="516" y1="177" x2="516" y2="183"/>
  </g>
  <!-- major graduations -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.7">
    <line x1="60"  y1="174" x2="60"  y2="186"/>
    <line x1="180" y1="174" x2="180" y2="186"/>
    <line x1="300" y1="174" x2="300" y2="186"/>
    <line x1="420" y1="174" x2="420" y2="186"/>
    <line x1="540" y1="174" x2="540" y2="186"/>
  </g>
  <!-- the observed body, entering transit at the ring's limb -->
  <circle cx="190" cy="180" r="9" fill="#1a1a1a"/>
</svg>
