<svg viewBox="-120 -120 480 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Upstream Zero — the mark, display cut (composition per ledger R-39/R-40/R-41).
       The ring at the origin; the datum extends downstream only.
       D=120. Ring stroke D/7.5=16 (drawn r=52, outer edge 60).
       Datum from the ring's rightmost point (60,0) to 3D total width (x=300),
       weight D/60=2, unbroken, never tilted.
       Governed by DESIGN_SYSTEM.md §1; changes only by ledger amendment. -->
  <circle cx="0" cy="0" r="52" fill="none" stroke="#1A1A18" stroke-width="16"/>
  <line x1="60" y1="0" x2="300" y2="0" stroke="#1A1A18" stroke-width="2"/>
</svg>
